name: Kirin CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint with ruff
        run: |
          ruff check agents/ eval/ src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install -r agents/requirements-dev.txt
      - name: Pre-download ChromaDB ONNX model
        run: |
          python3 -c "import chromadb.utils.embedding_functions as ef; ef.ONNXMiniLM_L6_V2()"
      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r agents/requirements.txt
      - name: Type check
        run: |
          mypy agents/skeptic.py agents/scorer.py --ignore-missing-imports || true
