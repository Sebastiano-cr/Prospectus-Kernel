name: Kirin CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install ruff
      - name: Lint with ruff
        run: |
          ruff check agents/ eval/ kirin-core/core/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install -r agents/requirements-dev.txt
      - name: Run unit tests
        run: |
          python -m pytest tests/test_policy_engine.py tests/test_skeptic_agent.py -v --tb=short
      - name: Run existing unit tests
        run: |
          python -m pytest tests/test_units.py -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r agents/requirements.txt
      - name: Type check
        run: |
          mypy agents/skeptic.py agents/score.py --ignore-missing-imports || true
