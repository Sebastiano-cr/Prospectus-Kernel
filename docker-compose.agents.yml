version: '3.8'

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - HF_API_KEY=${HF_API_KEY}
      - VERTEXAI_PROJECT=${VERTEXAI_PROJECT}
      - VERTEXAI_LOCATION=${VERTEXAI_LOCATION}
      - VERTEXAI_CREDENTIALS=${VERTEXAI_CREDENTIALS}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION_NAME=${AWS_REGION_NAME}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - AZURE_API_VERSION=${AZURE_API_VERSION}
    volumes:
      - ./litellm_config.yml:/app/config.yaml
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kirin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=kirin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kirin -d kirin"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  agents:
    restart: unless-stopped
    build:
      context: ./agents
    ports:
      - "8000:8000"
    environment:
      - PORT=${PORT:-8000}
      - LITELLM_URL=${LITELLM_URL:-http://litellm:4000}
      - QWEN_VL_MAX_API_KEY=${QWEN_VL_MAX_API_KEY}
      - DEEPSEEK_CHAT_API_KEY=${DEEPSEEK_CHAT_API_KEY}
      - MOONSHOT_V1_128K_API_KEY=${MOONSHOT_V1_128K_API_KEY}
      - CRM_PROVIDER=${CRM_PROVIDER}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - AIRTABLE_API_KEY=${AIRTABLE_API_KEY}
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID}
      - NOCODB_URL=${NOCODB_URL}
      - NOCODB_TOKEN=${NOCODB_TOKEN}
      # New environment variables for the cognitive layer
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=kirin
      - POSTGRES_USER=kirin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WHATSAPP_GATEWAY=${WHATSAPP_GATEWAY:-evolution}
      - OPENWA_URL=http://openwa:2785
      - OPENWA_API_KEY=${OPENWA_API_KEY:-}
      - OPENWA_SESSION=${OPENWA_SESSION:-kirin}
      - AGENTMEMORY_ENABLED=${AGENTMEMORY_ENABLED:-false}
      - AGENTMEMORY_URL=http://agentmemory:3111
      - AGENTMEMORY_SECRET=${AGENTMEMORY_SECRET:-}
    depends_on:
      litellm:
        condition: service_started
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    profiles: ["openwa"]
    restart: unless-stopped
    ports:
      - "2785:2785"
      - "2886:2886"
    environment:
      - OPENWA_API_KEY=${OPENWA_API_KEY}
    volumes:
      - openwa_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2785/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── agentmemory sidecar ───────────────────────────────────────────────────
  # Memória persistente entre sessões de prospecção.
  # Ativar com: docker compose --profile agentmemory up -d
  # Viewer: http://localhost:3113  |  API: http://localhost:3111
  # Critérios de promoção: ver integrations/agentmemory_client.py
  # ─────────────────────────────────────────────────────────────────────────
  agentmemory:
    image: node:20-alpine
    profiles: ["agentmemory"]
    restart: unless-stopped
    ports:
      - "3111:3111"
      - "3113:3113"
    environment:
      - AGENTMEMORY_SECRET=${AGENTMEMORY_SECRET}
      - AGENTMEMORY_AUTO_COMPRESS=false
      - AGENTMEMORY_INJECT_CONTEXT=false
      - OPENAI_API_KEY=${DEEPSEEK_CHAT_API_KEY}
      - OPENAI_BASE_URL=${LITELLM_URL:-http://litellm:4000}/v1
      - OPENAI_MODEL=deepseek-chat
    volumes:
      - agentmemory_data:/root/.agentmemory
    command: >
      sh -c "npm install -g @agentmemory/agentmemory@0.9.24 --quiet &&
             agentmemory"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3111/agentmemory/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  openwa_data:
  agentmemory_data:

# ── OpenWA Gateway (opcional) ─────────────────────────────────────────────────
# Ativar com: docker compose --profile openwa up -d
# Dashboard: http://localhost:2886  |  API: http://localhost:2785
# Critérios de promoção para produção: ver agents/messenger.py (sinal estenográfico)
# ─────────────────────────────────────────────────────────────────────────────