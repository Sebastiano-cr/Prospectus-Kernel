services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}

  agents:
    build:
      context: ./agents
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - LITELLM_URL=http://litellm:4000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CHROMA_PATH=/data/chroma
    volumes:
      - kirin_data:/data
    depends_on:
      - litellm

volumes:
  kirin_data:
